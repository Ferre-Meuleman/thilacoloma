title: 'Verhuur Pagina'
tabs:
  lokalen:
    display: 'Lokalen'
    sections:
      -
        display: 'Reservaties'
        fields:
          -
            handle: kampas_titel
            field:
              type: text
              display: 'Kampas Titel'
              default: 'Beschikbaarheid & Reservaties'
          -
            handle: kampas_beschrijving
            field:
              type: textarea
              display: 'Kampas Beschrijving'
          -
            handle: kampas_url
            field:
              type: link
              display: 'Kampas URL'
              default: 'https://www.kampas.be/nl/domein/scouts-thila-coloma'
      -
        display: 'Contact'
        fields:
          -
            handle: contact_titel
            field:
              type: text
              display: 'Contact Titel'
              default: 'Contact'
          -
            handle: contact_persoon
            field:
              type: text
              display: 'Contact Persoon'
          -
            handle: contact_email
            field:
              type: text
              display: 'Contact Email'
              input_type: email
              default: 'verhuur@thilacoloma.be'
          -
            handle: contact_beschrijving
            field:
              type: textarea
              display: 'Contact Beschrijving'
          -
            handle: waarschuwing_tekst
            field:
              type: textarea
              display: 'Waarschuwing'
              instructions: 'Belangrijke waarschuwing voor bezoekers'
