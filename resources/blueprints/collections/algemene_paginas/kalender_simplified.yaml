tabs:
  main:
    display: Hoofdinhoud
    sections:
      -
        display: 'Pagina Inhoud'
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
              display: 'Pagina Titel'
          -
            handle: intro_title
            field:
              type: text
              display: 'Intro Titel'
              default: 'Komende Evenementen'
          -
            handle: intro_text
            field:
              type: textarea
              display: 'Intro Tekst'
              default: 'Hier vind je een overzicht van alle kampen en weekends. We vergaderen elke zondag (behalve de eerste zondag van de maand)!'
  content:
    display: 'Pagina Content'
    sections:
      -
        display: Vergaderingen
        fields:
          -
            handle: meetings_title
            field:
              type: text
              display: 'Vergaderingen Titel'
              default: 'Wekelijkse Vergaderingen'
          -
            handle: meetings_description
            field:
              type: textarea
              display: 'Vergaderingen Beschrijving'
          -
            handle: vergaderingen_html
            field:
              type: textarea
              display: 'Vergaderingen Content (HTML)'
              instructions: 'Volledige HTML content voor de vergaderingen sectie'
      -
        display: 'Weekends & Kampen'
        fields:
          -
            handle: weekends_kampen_title
            field:
              type: text
              display: 'Weekends & Kampen Titel'
              default: 'Weekends & Kampen'
          -
            handle: weekends_kampen_intro
            field:
              type: textarea
              display: 'Weekends & Kampen Intro'
          -
            handle: weekends_kampen_html
            field:
              type: textarea
              display: 'Weekends & Kampen Content (HTML)'
              instructions: 'Volledige HTML content voor weekends en kampen'
      -
        display: Inschrijvingen
        fields:
          -
            handle: inschrijvingen_title
            field:
              type: text
              display: 'Inschrijvingen Titel'
              default: 'Inschrijvingen'
          -
            handle: inschrijvingen_intro
            field:
              type: textarea
              display: 'Inschrijvingen Intro'
          -
            handle: inschrijvingen_html
            field:
              type: textarea
              display: 'Inschrijvingen Content (HTML)'
              instructions: 'Volledige HTML content voor inschrijvingen'
  settings:
    display: Instellingen
    sections:
      -
        display: 'Calendar & Agenda'
        fields:
          -
            handle: google_calendar_url
            field:
              type: text
              display: 'Google Calendar URL'
          -
            handle: agenda_title
            field:
              type: text
              display: 'Agenda Titel'
              default: 'Agenda'
          -
            handle: agenda_empty_message
            field:
              type: text
              display: 'Agenda Empty Message'
          -
            handle: agenda_error_message
            field:
              type: text
              display: 'Agenda Error Message'
          -
            handle: calendar_loading_message
            field:
              type: text
              display: 'Calendar Loading Message'
          -
            handle: calendar_error_message
            field:
              type: text
              display: 'Calendar Error Message'
          -
            handle: year_calendar_title
            field:
              type: text
              display: 'Year Calendar Title'
              default: 'Scoutsjaar'
          -
            handle: navigation_previous_text
            field:
              type: text
              display: 'Navigation Previous Text'
              default: '‹'
          -
            handle: navigation_next_text
            field:
              type: text
              display: 'Navigation Next Text'
              default: '›'
title: Kalender
