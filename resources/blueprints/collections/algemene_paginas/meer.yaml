title: 'Meer Pagina'
tabs:
  # Tab 1: Visie
  visie:
    display: Visie
    sections:
      -
        display: 'Onze Visie'
        instructions: 'De centrale visie van Thila Coloma - wat scouting voor ons betekent'
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: 'Pagina Titel'
              default: 'Meer'
          -
            handle: visie_intro
            field:
              type: textarea
              display: 'Visie Introductie'
              instructions: 'Korte inleiding over de visie (2-3 zinnen)'
          -
            handle: visie_kernwaarden
            field:
              type: text
              display: 'Kernwaarden'
              instructions: 'Kommagescheiden lijst van kernwaarden (bijv. vriendschap, respect, inclusiviteit)'
          -
            handle: visie_tekst
            field:
              type: bard
              display: 'Visie Tekst'
              instructions: 'De volledige visie tekst met opmaak'
              buttons:
                - bold
                - italic
                - h2
                - h3
                - unorderedlist
                - orderedlist
                - quote

  # Tab 2: Contact & Groepsleiding
  groepsleiding:
    display: 'Contact & Groepsleiding'
    sections:
      -
        display: 'Groepsleiding Teksten'
        instructions: 'Tekstuele info over de groepsleiding. De leden zelf komen uit de Groepsleiding global.'
        fields:
          -
            handle: groepsleiding_intro
            field:
              type: textarea
              display: 'Groepsleiding Introductie'
              instructions: 'Korte intro over de groepsleiding'
          -
            handle: groepsleiding_algemeen_tekst
            field:
              type: textarea
              display: 'Algemene Groepsleiding Tekst'
              instructions: 'Algemene tekst over groepsleiding (zonder namen)'
          -
            handle: groepsleiding_email
            field:
              type: text
              display: 'Groepsleiding Email'
              default: 'groepsleiding@thilacoloma.be'
          -
            handle: groepsleiding_scoutsjaar
            field:
              type: text
              display: 'Scoutsjaar'
              default: '2025-2026'
      -
        display: 'Contactgegevens'
        instructions: 'Deze gegevens worden gebruikt in de contact tab. De groepsleiding leden zelf worden beheerd in de Groepsleiding global.'
        fields:
          -
            handle: contact_takleiding_tip
            field:
              type: markdown
              display: 'Tip Takleiding Contact'
              instructions: 'Tekst over hoe ouders de takleiding kunnen contacteren. Je kan hier links toevoegen met markdown syntax: [tekst](/link)'
              default: 'Voor vragen over een activiteit, van de tak van je kind, contacteer je best iemand van de [takleiding](/takken). Deze contactgegevens zijn te vinden in de [Blauwe Gids](/thilala). Dit handige boekje krijgen de leden mee in het begin van het scoutsjaar. Je kan er eventueel ook eentje vragen aan de Fiskehytte op de scouts.'
          -
            handle: contact_emails
            field:
              type: replicator
              display: 'Contact Emails'
              instructions: 'Voeg contactgegevens toe (kan meerdere zijn)'
              sets:
                email:
                  display: 'Email Contact'
                  fields:
                    -
                      handle: label
                      field:
                        type: text
                        display: Label
                        instructions: 'Bijvoorbeeld: Werkjes, Verhuur lokalen, Verhuur tenten'
                        required: true
                    -
                      handle: icon
                      field:
                        type: select
                        display: Icoon
                        options:
                          'fa-tools': Werkjes
                          'fa-home': Lokalen
                          'fa-campground': Tenten
                          'fa-envelope': Algemeen
                          'fa-phone': Telefoon
                        default: 'fa-envelope'
                    -
                      handle: email
                      field:
                        type: text
                        display: Email
                        required: true
                        validate:
                          - email

  # Tab 3: Inschrijvingen
  inschrijvingen:
    display: Inschrijvingen
    sections:
      -
        display: 'Inschrijving Info'
        fields:
          -
            handle: inschrijvingsformulier_link
            field:
              type: link
              display: 'Inschrijvingsformulier Link'
          -
            handle: stamhoofd_link
            field:
              type: link
              display: 'Stamhoofd Link'
          -
            handle: inschrijving_scoutsjaar
            field:
              type: text
              display: 'Inschrijving Scoutsjaar'
              default: '2025-2026'
          -
            handle: lidgeld_standaard
            field:
              type: text
              display: 'Lidgeld Standaard'
              default: '€70'
          -
            handle: lidgeld_verminderd
            field:
              type: text
              display: 'Lidgeld Verminderd'
              default: '€17'
          -
            handle: kampgeld_standaard
            field:
              type: text
              display: 'Kampgeld Standaard'
              default: '€160'
          -
            handle: kampgeld_verminderd
            field:
              type: text
              display: 'Kampgeld Verminderd'
              default: '€50'

  # Tab 4: Uniform
  uniform:
    display: Uniform
    sections:
      -
        display: 'Uniform Info'
        fields:
          -
            handle: uniform_content
            field:
              type: bard
              display: 'Uniform Content'
              instructions: 'Volledige uniform info: waarom, benodigdheden, waar te koop, kleuren per tak, badges, onderhoud'
              buttons:
                - bold
                - italic
                - h2
                - h3
                - h4
                - unorderedlist
                - orderedlist
                - quote
                - anchor
                - image

  # Tab 5: Praktisch
  praktisch:
    display: Praktisch
    sections:
      -
        display: 'Praktische Info'
        fields:
          -
            handle: praktisch_inschrijven
            field:
              type: bard
              display: 'Inschrijven'
              instructions: 'Info over inschrijvingen, wachtlijsten, procedure, AKABE, etc.'
              buttons:
                - bold
                - italic
                - h2
                - h3
                - h4
                - unorderedlist
                - orderedlist
                - anchor
          -
            handle: praktisch_betalingen
            field:
              type: bard
              display: 'Betalingen & Lidgeld'
              instructions: 'Info over lidgeld, samenstelling, verminderd tarief, mutualiteit'
              buttons:
                - bold
                - italic
                - h2
                - h3
                - h4
                - unorderedlist
                - orderedlist
                - anchor
          -
            handle: praktisch_kosten_overzicht
            field:
              type: bard
              display: 'Financieel Overzicht'
              instructions: 'Kostentabellen voor normale en extra kosten'
              buttons:
                - bold
                - italic
                - h2
                - h3
                - h4
                - unorderedlist
                - orderedlist

  # Tab 6: Beleid
  beleid:
    display: Beleid
    sections:
      -
        display: 'Beleidsdocumenten'
        fields:
          -
            handle: beleid_veiligheid
            field:
              type: bard
              display: 'Veiligheidsbeleid'
              instructions: 'Volledige tekst veiligheidsbeleid met procedures en contactpersonen'
              buttons:
                - bold
                - italic
                - h2
                - h3
                - h4
                - unorderedlist
                - orderedlist
                - anchor
          -
            handle: beleid_pest_inclusie
            field:
              type: bard
              display: 'Pest & Inclusie Beleid'
              instructions: 'Pestbeleid en inclusiebeleid met procedures'
              buttons:
                - bold
                - italic
                - h2
                - h3
                - h4
                - unorderedlist
                - orderedlist
                - anchor
          -
            handle: beleid_integriteit
            field:
              type: bard
              display: 'Integriteitsbeleid'
              instructions: 'Integriteitsbeleid met waarden en meldingsmogelijkheden'
              buttons:
                - bold
                - italic
                - h2
                - h3
                - h4
                - unorderedlist
                - orderedlist
                - anchor
          -
            handle: beleid_privacy
            field:
              type: bard
              display: 'Privacybeleid'
              instructions: 'Privacybeleid en GDPR informatie'
              buttons:
                - bold
                - italic
                - h2
                - h3
                - h4
                - unorderedlist
                - orderedlist
                - anchor
          -
            handle: beleid_gedragsregels
            field:
              type: bard
              display: 'Gedragsregels'
              instructions: 'Gedragsregels voor leden, ouders en leiding'
              buttons:
                - bold
                - italic
                - h2
                - h3
                - h4
                - unorderedlist
                - orderedlist

  # Tab 7: FAQ
  faq:
    display: FAQ
    sections:
      -
        display: 'Veelgestelde Vragen'
        fields:
          -
            handle: faq_intro
            field:
              type: textarea
              display: 'FAQ Intro'
              instructions: 'Korte introductie bovenaan de FAQ sectie'
          -
            handle: faq_items
            field:
              type: replicator
              display: 'FAQ Items'
              instructions: 'Voeg veelgestelde vragen en antwoorden toe'
              sets:
                vraag:
                  display: 'Vraag & Antwoord'
                  fields:
                    -
                      handle: vraag
                      field:
                        type: text
                        display: Vraag
                        required: true
                    -
                      handle: antwoord
                      field:
                        type: bard
                        display: Antwoord
                        buttons:
                          - bold
                          - italic
                          - anchor
          -
            handle: faq_contact_tekst
            field:
              type: textarea
              display: 'FAQ Contact Tekst'
              instructions: 'Tekst onder de FAQ voor extra vragen'
          -
            handle: faq_contact_email
            field:
              type: text
              display: 'FAQ Contact Email'
              default: 'groepsleiding@thilacoloma.be'

  # Tab 8: Extra
  extra:
    display: Extra
    sections:
      -
        display: 'Extra Info'
        fields:
          -
            handle: extra_jaarthemas
            field:
              type: bard
              display: 'Jaarthemas'
              instructions: 'Info over jaarthemas en huidige thema'
              buttons:
                - bold
                - italic
                - h2
                - h3
                - h4
                - unorderedlist
                - orderedlist
          -
            handle: extra_liederen
            field:
              type: bard
              display: 'Onze Liederen'
              instructions: 'Groepsliederen en tak-specifieke liedjes'
              buttons:
                - bold
                - italic
                - h2
                - h3
                - h4
                - unorderedlist
                - orderedlist
          -
            handle: extra_geschiedenis
            field:
              type: bard
              display: 'Onze Geschiedenis'
              instructions: 'Geschiedenis en tijdlijn van Thila Coloma'
              buttons:
                - bold
                - italic
                - h2
                - h3
                - h4
                - unorderedlist
                - orderedlist
                - image
