title: Home
sections:
  main:
    display: Hoofdinhoud
    fields:
      -
        handle: intro_title
        field:
          type: text
          display: 'Intro Titel'
          default: 'Thila Coloma'
          instructions: 'De hoofdtitel die prominent wordt weergegeven'
          width: 100
      -
        handle: intro_text
        field:
          type: markdown
          display: 'Introductie Tekst'
          default: |
            Thila Coloma is een gemengde **jeugdbeweging** die in 1975 werd opgericht en ondertussen tot de grootste scoutsgroep van **Mechelen** is uitgegroeid. Ruim 400 jongeren voelen zich bij ons thuis. Hiermee zijn we de 5de grootste scoutsgroep van Vlaanderen.
            
            **Ons terrein** ligt tussen de Jubellaan en de Geerdegemstraat. Meer info over ons vindt je [hier](/over).
          instructions: 'Volledige introductietekst over Thila Coloma (markdown ondersteund)'
          width: 100
