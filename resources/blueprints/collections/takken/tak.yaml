title: 'Scouts Tak'
sections:
  main:
    display: 'Tak Informatie'
    fields:
      -
        handle: title
        field:
          type: text
          required: true
          display: 'Tak Naam'
      -
        handle: slug
        field:
          type: slug
          required: true
          display: 'URL Slug'
      -
        handle: tak_groep
        field:
          type: select
          display: 'Tak Groep'
          instructions: 'De kleur/groep waartoe deze tak behoort'
          options:
            kapoenen: Kapoenen
            welpen: Welpen
            jongverkenners: Jongverkenners
            verkenners: Verkenners
            voortrekkers: Voortrekkers
            tictak: Tictak
          required: true
      -
        handle: age_range
        field:
          type: text
          display: Leeftijdsgroep
          instructions: 'Bijvoorbeeld: 6-8 jaar'
      -
        handle: content
        field:
          type: markdown
          display: 'Pagina Inhoud'
          instructions: 'De hoofdtekst van de pagina (markdown)'
  
  subtakken:
    display: Subtakken
    fields:
      -
        handle: subtakken
        field:
          type: replicator
          display: 'Subtakken'
          instructions: 'Voeg hier de subtakken toe (bijv. Kapoenen 1, Kapoenen 2). De naam moet exact overeenkomen met de tak_naam in de leidingsploegen global!'
          sets:
            subtak:
              display: Subtak
              fields:
                -
                  handle: naam
                  field:
                    type: text
                    display: Naam
                    required: true
                    instructions: 'MOET exact overeenkomen met tak_naam in leidingsploegen (bijv. "Kapoenen 1")'
                -
                  handle: afwezigheids_formulier
                  field:
                    type: link
                    display: 'Afwezigheidsformulier'
                    instructions: 'Link naar het afwezigheidsformulier voor deze subtak'
                -
                  handle: rekeningnummer
                  field:
                    type: text
                    display: Rekeningnummer
                    instructions: 'Bankrekening voor deze subtak (bijv. BE83 9735 0413 6215)'
