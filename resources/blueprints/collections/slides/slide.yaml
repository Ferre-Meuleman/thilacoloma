title: 'Nieuwsslide'
tabs:
  slide:
    display: 'Slide (Beknopt)'
    sections:
      -
        display: 'Basis Informatie'
        instructions: 'Deze info verschijnt in de slideshow op home en kalender'
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
              display: 'Titel'
              instructions: 'Titel van het nieuws/evenement'
              width: 50
          -
            handle: publication_date
            field:
              type: date
              required: true
              validate:
                - required
              display: 'Publicatiedatum'
              instructions: 'Datum van publicatie (gebruikt voor sortering - nieuwste eerst)'
              time_enabled: false
              default: now
              width: 50
          -
            handle: image
            field:
              type: assets
              container: assets
              max_files: 1
              display: 'Hoofdafbeelding'
              instructions: 'Afbeelding voor de slide (optioneel)'
              restrict: false
              allow_uploads: true
              mode: grid
          -
            handle: content
            field:
              type: textarea
              display: 'Korte Beschrijving'
              instructions: 'Korte samenvatting voor slideshow (max 2-3 zinnen)'
              rows: 4
              character_limit: 250
              required: true
          -
            handle: button_text
            field:
              type: text
              display: 'Knop Tekst'
              instructions: 'Tekst voor de actieknop'
              default: 'Meer info'
              width: 50
  popup:
    display: 'Popup (Uitgebreid)'
    sections:
      -
        display: 'Evenement Details'
        instructions: 'Extra informatie die in de popup verschijnt'
        fields:
          -
            handle: event_date
            field:
              type: date
              display: 'Evenement Datum'
              instructions: 'Wanneer vindt dit plaats? (indien van toepassing)'
              time_enabled: true
              width: 50
          -
            handle: event_end_date
            field:
              type: date
              display: 'Eind Datum'
              instructions: 'Voor meerdaagse evenementen (optioneel)'
              time_enabled: true
              width: 50
          -
            handle: location
            field:
              type: text
              display: 'Locatie'
              instructions: 'Waar vindt dit plaats? (bijv. "Scouts lokalen", "Kamp X")'
          -
            handle: popup_content
            field:
              type: bard
              display: 'Uitgebreide Beschrijving'
              instructions: 'Volledige info met opmaak (lijsten, links, etc.)'
              buttons:
                - h3
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - anchor
              toolbar_mode: fixed
              save_html: false
              always_show_set_button: false
          -
            handle: extra_images
            field:
              type: assets
              container: assets
              max_files: 5
              display: 'Extra Afbeeldingen'
              instructions: 'Extra foto''s voor in de popup (max 5)'
              restrict: false
              allow_uploads: true
              mode: grid
      -
        display: 'Actie Knoppen'
        fields:
          -
            handle: primary_action_text
            field:
              type: text
              display: 'Primaire Actie Tekst'
              instructions: 'Tekst voor hoofdknop (bijv. "Inschrijven", "Bestellen")'
              width: 50
          -
            handle: primary_action_link
            field:
              type: text
              display: 'Primaire Actie Link'
              instructions: 'URL voor de hoofdknop'
              width: 50
          -
            handle: secondary_action_text
            field:
              type: text
              display: 'Secundaire Actie Tekst'
              instructions: 'Tekst voor tweede knop (optioneel)'
              width: 50
          -
            handle: secondary_action_link
            field:
              type: text
              display: 'Secundaire Actie Link'
              instructions: 'URL voor tweede knop'
              width: 50
      -
        display: 'Extra Info'
        fields:
          -
            handle: price_info
            field:
              type: text
              display: 'Prijs Info'
              instructions: 'Prijsinformatie (bijv. "€5 per pizza", "Gratis")'
          -
            handle: deadline
            field:
              type: date
              display: 'Deadline'
              instructions: 'Deadline voor inschrijving/bestelling (optioneel)'
              time_enabled: false
          -
            handle: contact_email
            field:
              type: text
              display: 'Contact Email'
              instructions: 'Email voor vragen (optioneel)'
              input_type: email
  sidebar:
    display: Sidebar
    sections:
      -
        display: Status
        fields:
          -
            handle: slug
            field:
              type: slug
              required: true
              localizable: true
          -
            handle: enabled
            field:
              type: toggle
              display: 'Actief'
              instructions: 'Uitgeschakelde slides worden niet getoond'
              default: true
