tabs:
  main:
    display: Main
    sections:
      -
        display: 'Page Information'
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
              display: Title
              width: 50
          -
            handle: slug
            field:
              type: slug
              required: true
              validate:
                - required
              display: Slug
              width: 50
      -
        display: 'Thilala Content'
        fields:
          -
            handle: page_title
            field:
              type: text
              display: 'Page Title'
              default: 'Thilala Maandblad'
              instructions: 'The main heading displayed on the page'
              validate:
                - required
      -
        display: 'Info Sectie (Links)'
        instructions: 'De informatie die links op de pagina verschijnt'
        fields:
          -
            handle: thilala_info_title
            field:
              type: text
              display: 'Info Titel'
              instructions: 'Titel van de info sectie (bijv. "Over de Thilala")'
              default: 'Over de Thilala'
          -
            handle: thilala_info_text
            field:
              type: markdown
              display: 'Info Tekst'
              instructions: 'De uitleg over wat de Thilala is. Je kan markdown gebruiken voor opmaak.'
              default: |
                De Thilala is het maandelijks uitgegeven online boekje waarin alle informatie voor die maand staat. Aan het begin van het boekje zullen zaken terug te vinden zijn die de hele scouts aangaan, tegen het einde zijn de maandschorsen per tak te vinden.
                
                **Het is belangrijk dat je de Thilala op tijd leest**, zodat je niet voor verrassingen komt te staan. Mocht je de Thilala niet kunnen lezen, neem dan contact op met **Coelho** ([coelho@thilacoloma.be](mailto:coelho@thilacoloma.be)).
      -
        display: 'Blauwe Gids'
        instructions: 'Upload hier de Blauwe Gids (verschijnt links onderaan)'
        fields:
          -
            handle: blauwe_gids
            field:
              type: assets
              container: documents
              max_files: 1
              display: 'Blauwe Gids PDF'
              instructions: 'Upload de Blauwe Gids. Maximum file size: 50MB.'
              restrict: false
              allow_uploads: true
              show_filename: true
              show_set_alt: false
          -
            handle: blauwe_gids_title
            field:
              type: text
              display: 'Blauwe Gids Titel'
              default: 'Blauwe Gids'
              instructions: 'Titel boven de download knop'
          -
            handle: blauwe_gids_description
            field:
              type: textarea
              display: 'Blauwe Gids Beschrijving'
              instructions: 'Korte uitleg over de Blauwe Gids (optioneel)'
              rows: 2
      -
        display: 'NIET MEER GEBRUIKEN - Oude Velden'
        instructions: 'Deze velden worden niet meer gebruikt, alles gebeurt via de Thilala collection'
        fields:
          -
            handle: intro_text
            field:
              type: markdown
              display: '[DEPRECATED] Introduction Text'
              instructions: 'DIT VELD WORDT NIET MEER GEBRUIKT'
          -
            handle: current_pdf
            field:
              type: assets
              container: documents
              max_files: 1
              display: 'Current Thilala PDF'
              instructions: 'Upload the current month''s Thilala PDF. Maximum file size: 50MB. Only one file allowed.'
              restrict: false
              allow_uploads: true
              show_filename: true
              show_set_alt: false
          -
            handle: pdf_title
            field:
              type: text
              display: 'PDF Display Title'
              instructions: 'Title shown in the PDF viewer (e.g., "Thilala Januari 2025")'
              default: 'Thilala.pdf'
              validate:
                - required
      -
        display: 'Archive Section'
        fields:
          -
            handle: show_archive
            field:
              type: toggle
              display: 'Show Archive Section'
              instructions: 'Enable to show a section with previous Thilala editions'
              default: false
          -
            handle: archive_title
            field:
              type: text
              display: 'Archive Section Title'
              default: 'Vorige Edities'
              instructions: 'Title for the archive section'
              if:
                show_archive: 'equals true'
          -
            handle: archive_pdfs
            field:
              type: replicator
              display: 'Archive PDFs'
              instructions: 'Add previous editions of Thilala'
              if:
                show_archive: 'equals true'
              sets:
                archive_item:
                  display: 'Archive Item'
                  fields:
                    -
                      handle: title
                      field:
                        type: text
                        display: 'Edition Title'
                        instructions: 'e.g., "December 2024", "November 2024"'
                        validate:
                          - required
                    -
                      handle: pdf_file
                      field:
                        type: assets
                        container: documents
                        max_files: 1
                        display: 'PDF File'
                        instructions: 'Maximum file size: 50MB'
                        restrict: false
                        allow_uploads: true
                        show_filename: true
                        show_set_alt: false
                    -
                      handle: description
                      field:
                        type: textarea
                        display: 'Description'
                        instructions: 'Optional short description of this edition'
                        rows: 2
  sidebar:
    display: Sidebar
    sections:
      -
        display: 'Page Settings'
        fields:
          -
            handle: template
            field:
              type: template
              display: Template
              default: thilala
          -
            handle: layout
            field:
              type: text
              display: Layout
              default: 'layouts/page'
