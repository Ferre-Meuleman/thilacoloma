title: Leidingsploegen
tabs:
  kapoenen:
    display: Kapoenen
    sections:
      -
        fields:
          -
            handle: kapoenen
            field:
              type: replicator
              display: 'Kapoenen takken'
              collapsed: false
              sets:
                leidingsploeg:
                  display: Leidingsploeg
                  fields:
                    -
                      handle: tak_naam
                      field:
                        type: text
                        display: 'Tak naam'
                        instructions: 'Bijv. "Kapoenen 1"'
                        required: true
                    -
                      handle: tak_groep
                      field:
                        type: text
                        display: 'Tak groep'
                        default: kapoenen
                        read_only: true
                    -
                      handle: actief
                      field:
                        type: toggle
                        display: Actief
                        default: true
                    -
                      handle: leiding
                      field:
                        type: replicator
                        display: Leidingsteam
                        collapsed: false
                        sets:
                          leider:
                            display: Leider
                            fields:
                              -
                                handle: voornaam
                                field:
                                  type: text
                                  display: Voornaam
                                  required: true
                              -
                                handle: achternaam
                                field:
                                  type: text
                                  display: Achternaam
                              -
                                handle: totem
                                field:
                                  type: text
                                  display: Totem
                              -
                                handle: functie
                                field:
                                  type: select
                                  display: Functie
                                  options:
                                    takleider: Takleider
                                    leiding: Leiding
                                    jin: Jin
                                  default: leiding
                              -
                                handle: email
                                field:
                                  type: text
                                  display: Email
                                  validate: email
