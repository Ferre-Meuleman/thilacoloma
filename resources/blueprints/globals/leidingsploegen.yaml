title: Leidingsploegen
tabs:
  groepsleiding:
    display: Groepsleiding
    sections:
      -
        fields:
          -
            handle: groepsleiding
            field:
              type: replicator
              display: 'Groepsleiding'
              collapse: true
              sets:
                leidingsploeg:
                  display: 'Leidingsploeg'
                  fields:
                    -
                      handle: tak_naam
                      field:
                        type: text
                        display: 'Tak naam'
                        default: 'Groepsleiding'
                        required: true
                    -
                      handle: tak_groep
                      field:
                        type: text
                        display: 'Tak groep'
                        default: 'groepsleiding'
                        disabled: true
                    -
                      handle: actief
                      field:
                        type: toggle
                        display: 'Actief'
                        default: true
                    -
                      handle: leiding
                      field:
                        type: replicator
                        display: 'Leidingsteam'
                        collapse: true
                        sets:
                          leider:
                            display: 'Leider'
                            fields:
                              -
                                handle: voornaam
                                field:
                                  type: text
                                  display: 'Voornaam'
                                  required: true
                              -
                                handle: achternaam
                                field:
                                  type: text
                                  display: 'Achternaam'
                              -
                                handle: totem
                                field:
                                  type: text
                                  display: 'Totem'
                                  instructions: 'Volledige totem (bijv. "Zachtaardige Coscoroba")'
                              -
                                handle: functie
                                field:
                                  type: select
                                  display: 'Functie'
                                  options:
                                    takleider: Takleider
                                    leiding: Leiding
                                  default: leiding
                              -
                                handle: email
                                field:
                                  type: text
                                  display: 'Email'
                                  validate: 'email'
