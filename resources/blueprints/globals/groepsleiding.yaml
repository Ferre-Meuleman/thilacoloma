title: 'Groepsleiding'
tabs:
  groepsleiding:
    display: Groepsleiding
    sections:
      -
        display: 'Groepsleiding Algemeen'
        instructions: 'Algemene informatie over de groepsleiding'
        fields:
          -
            handle: groepsleiding_scoutsjaar
            field:
              type: text
              display: 'Scoutsjaar'
              instructions: 'Bijvoorbeeld: 2025-2026'
          -
            handle: groepsleiding_algemeen_tekst
            field:
              type: textarea
              display: 'Algemene Tekst'
              instructions: 'Introductietekst over de groepsleiding'
          -
            handle: groepsleiding_email
            field:
              type: text
              display: 'Groepsleiding Email'
              instructions: 'Algemeen contactadres van de groepsleiding'
          -
            handle: contact_takleiding_tip
            field:
              type: textarea
              display: 'Tip over Takleiding'
          -
            handle: contact_werkjes_email
            field:
              type: text
              display: 'Email Vragen over werkjes'
          -
            handle: contact_verhuur_lokalen_email
            field:
              type: text
              display: 'Email Verhuur Lokalen'
          -
            handle: contact_verhuur_tenten_email
            field:
              type: text
              display: 'Email Verhuur Tenten'
      -
        display: 'Groepsleiding Leden'
        instructions: 'De groepsleiding leden worden jaarlijks geupdate. Deze globaal bevat enkel de leden met hun info.'
        fields:
          -
            handle: groepsleiding_leden
            field:
              type: replicator
              display: 'Groepsleiding Leden'
              instructions: 'Voeg hier de groepsleidingsleden toe'
              sets:
                lid:
                  display: 'Groepsleiding Lid'
                  fields:
                    -
                      handle: totem
                      field:
                        type: text
                        display: Totem
                        required: true
                    -
                      handle: naam
                      field:
                        type: text
                        display: 'Volledige Naam'
                        required: true
                    -
                      handle: foto
                      field:
                        type: assets
                        display: Foto
                        container: assets
                        max_files: 1
                    -
                      handle: hoofdtaken
                      field:
                        type: text
                        display: Hoofdtaken
                    -
                      handle: beschrijving
                      field:
                        type: textarea
                        display: Beschrijving
                    -
                      handle: email
                      field:
                        type: text
                        display: Email

