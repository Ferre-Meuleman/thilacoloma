title: 'Groepsleiding'
tabs:
  groepsleiding:
    display: Groepsleiding
    sections:
      -
        display: 'Groepsleiding Leden'
        instructions: 'De groepsleiding leden worden jaarlijks geupdate. Deze globaal bevat enkel de leden met hun info.'
        fields:
          -
            handle: groepsleiding_leden
            field:
              type: replicator
              display: 'Groepsleiding Leden'
              instructions: 'Voeg hier de groepsleidingsleden toe'
              sets:
                lid:
                  display: 'Groepsleiding Lid'
                  fields:
                    -
                      handle: totem
                      field:
                        type: text
                        display: Totem
                        required: true
                    -
                      handle: naam
                      field:
                        type: text
                        display: 'Volledige Naam'
                        required: true
                    -
                      handle: foto
                      field:
                        type: assets
                        display: Foto
                        container: assets
                        max_files: 1
                    -
                      handle: hoofdtaken
                      field:
                        type: text
                        display: Hoofdtaken
                    -
                      handle: beschrijving
                      field:
                        type: textarea
                        display: Beschrijving
                    -
                      handle: email
                      field:
                        type: text
                        display: Email

