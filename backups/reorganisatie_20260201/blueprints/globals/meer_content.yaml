title: 'Meer Pagina Content'
sections:
  visie:
    display: 'Visie Sectie'
    fields:
      -
        handle: visie_intro
        field:
          type: textarea
          display: 'Visie Intro'
          instructions: 'De openingsvraag van de visie sectie'
          default: 'Waar sta jij voor als scout? Dat is de vraag waarmee we afgelopen jaar op zoek gingen naar een algemene visie van wat scouting voor Thila Coloma inhoudt.'
      -
        handle: visie_kernwaarden
        field:
          type: text
          display: 'Kernwaarden'
          instructions: 'De drie kernwaarden (gescheiden door komma''s)'
          default: 'vriendschap, respect en inclusiviteit'
      -
        handle: visie_tekst
        field:
          type: bard
          display: 'Visie Volledige Tekst'
          instructions: 'De volledige visie tekst (met opmaak)'
          sets:
            text:
              display: Text
              fields:
                -
                  handle: text
                  field:
                    type: text
  groepsleiding:
    display: 'Groepsleiding Sectie'
    fields:
      -
        handle: groepsleiding_intro
        field:
          type: textarea
          display: 'Groepsleiding Intro'
          default: 'De groepsleiding bestaat uit Mustela, Coelho, Pumba, Kantjil en Taipan (onze totems). Hieronder vind je de taakverdeling. Afhankelijk van je vraag kan je ons gericht contacteren.'
      -
        handle: groepsleiding_scoutsjaar
        field:
          type: text
          display: 'Scoutsjaar'
          instructions: 'Het huidige scoutsjaar voor de groepsleiding sectie'
          default: '2025-2026'
      -
        handle: groepsleiding_leden
        field:
          type: replicator
          display: 'Groepsleiding Leden'
          sets:
            lid:
              display: 'Groepsleiding Lid'
              fields:
                -
                  handle: totem
                  field:
                    type: text
                    display: 'Totem'
                    required: true
                -
                  handle: naam
                  field:
                    type: text
                    display: 'Volledige Naam'
                    required: true
                -
                  handle: foto
                  field:
                    type: text
                    display: 'Foto Pad'
                    instructions: 'Pad naar de foto (bijv. /assets/images/leidingfotos/Mustela.jpg)'
                -
                  handle: hoofdtaken
                  field:
                    type: text
                    display: 'Hoofdtaken'
                    instructions: 'Korte beschrijving van de hoofdtaken'
                -
                  handle: beschrijving
                  field:
                    type: textarea
                    display: 'Beschrijving'
                    instructions: 'Persoonlijke beschrijving van taken en rol'
                -
                  handle: email
                  field:
                    type: text
                    display: 'Email'
                    validate: email
  inschrijvingen:
    display: 'Inschrijvingen Sectie'
    fields:
      -
        handle: inschrijvingsformulier_link
        field:
          type: text
          display: 'Inschrijvingsformulier Link'
          instructions: 'Google Forms link voor nieuwe inschrijvingen'
          default: 'https://forms.gle/ogqkK2dpaUZmzS7u7'
      -
        handle: stamhoofd_link
        field:
          type: text
          display: 'Stamhoofd Inschrijving Link'
          default: 'https://inschrijven.thilacoloma.be/'
      -
        handle: inschrijving_scoutsjaar
        field:
          type: text
          display: 'Inschrijving Scoutsjaar'
          default: '2025-2026'
      -
        handle: beschikbaarheid_tekst
        field:
          type: bard
          display: 'Beschikbaarheid per Geboortejaar'
          instructions: 'Informatie over welke geboortejaren vol zijn, wachtlijst hebben, etc.'
  financien:
    display: 'Financiën Sectie'
    fields:
      -
        handle: lidgeld_standaard
        field:
          type: text
          display: 'Lidgeld Standaard'
          default: '€70'
      -
        handle: lidgeld_verminderd
        field:
          type: text
          display: 'Lidgeld Verminderd Tarief'
          default: '€17'
      -
        handle: kampgeld_standaard
        field:
          type: text
          display: 'Kampgeld Standaard'
          default: '€160'
      -
        handle: kampgeld_verminderd
        field:
          type: text
          display: 'Kampgeld Verminderd'
          default: '€50'
  uniform:
    display: 'Uniform Sectie'
    fields:
      -
        handle: uniform_waarom
        field:
          type: textarea
          display: 'Waarom een Uniform?'
          default: 'Het scoutsuniform zorgt voor gelijkheid en verbondenheid binnen de groep. Het toont ook naar buiten toe dat je bij de scouts hoort en creëert een gevoel van saamhorigheid.'
      -
        handle: uniform_benodigdheden
        field:
          type: replicator
          display: 'Uniform Benodigdheden'
          sets:
            item:
              display: 'Item'
              fields:
                -
                  handle: naam
                  field:
                    type: text
                    display: 'Naam'
                -
                  handle: beschrijving
                  field:
                    type: text
                    display: 'Beschrijving'
      -
        handle: tak_kleuren
        field:
          type: replicator
          display: 'Tak Kleuren'
          sets:
            kleur:
              display: 'Kleur'
              fields:
                -
                  handle: tak
                  field:
                    type: text
                    display: 'Tak Naam'
                -
                  handle: kleur
                  field:
                    type: text
                    display: 'Kleur Naam'
                -
                  handle: css_class
                  field:
                    type: text
                    display: 'CSS Class'
                    instructions: 'CSS class voor de kleur badge (bijv. kapoenen-kleur)'
