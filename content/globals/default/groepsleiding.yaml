groepsleiding_leden:
  -
    id: gl-kantjil
    type: lid
    totem: 'Toegewijde Kantjil'
    naam: 'Ferre Meuleman'
    foto: /assets/images/leidingfotos/Kantjil.jpg
    hoofdtaken: 'Materiaal- en lokalenbeheer'
    beschrijving: |
      Ik ben dit jaar 3de jaar groepsleiding en 4de jaar leiding, en zet me met veel enthousiasme in voor onze scouts. Mijn hoofdtaak is het beheren, onderhouden en verhuren van ons materiaal, de tenten en de gebouwen. Daarnaast werk ik via de VZW mee aan het onderhouden en vernieuwen van onze lokalen. Momenteel ben ik bezig met het vervangen en herstellen van de tenten, waarvan sommige al meer dan 40 jaar meegaan. In mijn laatste jaar als groepsleiding wil ik dit project afronden, zodat de scouts de komende jaren kan rekenen op degelijk materiaal. Het geeft me veel voldoening om achter de schermen alles in orde te brengen, zodat onze leden zorgeloos van hun scoutingavonturen kunnen genieten. Naast de scouts ben ik ook volop bezig met mijn studies: na mijn bachelor elektromechanica ga ik schakelen naar industrieel ingenieur, om mijn technische kennis verder uit te bouwen.
    email: kantjil@thilacoloma.be
  -
    id: gl-coelho
    type: lid
    totem: 'Ongedwongen Coelho'
    naam: 'Simon Beel'
    foto: /assets/images/leidingfotos/Coelho.jpg
    hoofdtaken: Communicatie
    beschrijving: |
      Als student Grafisch Ontwerp zet ik mijn passie voor creativiteit en communicatie graag in bij Thila Coloma. In mijn tweede jaar groepsleiding zijn mijn belangrijkste taken Communicatie, opvoling van leiding en Kamp. Betreffende communicatie is het mijn taak dat alle informatie duidelijk en tijdig bij iedereen terechtkomt. Om dit vlot te laten verlopen, werk ik samen met 4 anderen die elk een rol spelen binnen 'team communicatie'. Samen zorgen wij ervoor dat leden en ouders altijd goed geïnformeerd zijn. Dit hebben we vorig jaar al proberen verbeteren a.d.h.v. de ouderbevraging en onze eigen bevindingen. Daaruit kwamen verschillende aanpassingen zoals deze blauwe gids. Dit jaar focus ik mij op de interne communicatie en de nieuwe website.
    email: coelho@thilacoloma.be
  -
    id: gl-orso
    type: lid
    totem: 'Toegewijde Orso'
    naam: 'Wout Festraets Willemen'
    foto: /assets/images/leidingfotos/Orso.jpg
    hoofdtaken: Administratie
    beschrijving: |
      Ik ben Orso, studeer voor industrieel ingenieur, en begin aan mijn 3e jaar leiding geven. Ook zal ik de komende 3 jaar als groepsleiding verantwoordelijk zijn voor de ledenadministratie, inschrijvingen en verzekeringen. Ook de mails voor de groepsleiding zal ik voor jullie beantwoorden. Mede door deze taken achter de schermen, zal ik proberen alle leden van TC een zorgeloze en aangename scoutservaring mee te geven!
    email: orso@thilacoloma.be
  -
    id: gl-koala
    type: lid
    totem: 'Betrokken Koala'
    naam: 'Malou De Clercq'
    foto: /assets/images/leidingfotos/Koala.jpg
    hoofdtaken: Inclusie
    beschrijving: |
      Hoi, ik ben Koala! Dit jaar ben ik als groepsleiding verantwoordelijk voor de verslagen en zorg ik ervoor dat de leiding altijd up-to-date is. Daarnaast volg ik de leiding op om ervoor te zorgen dat ook zij zich goed voelen in de scouts en de dynamiek binnen de ploeg goed zit. Mijn derde hoofdtaak is inclusiviteit. Dankzij mijn studie orthopedagogie kan ik mijn kennis inzetten om dit concreet vorm te geven binnen de scouts. Samen met team inclusief ga ik aan de slag met belangrijke thema's zoals pestgedrag, diversiteit en gedragsproblemen, met als doel om een veilige en positieve sfeer te creëren voor elke thilaan. Aarzel niet om me aan te spreken bij vragen, problemen of suggesties. Tot snel op de terreinen van TC!
    email: koala@thilacoloma.be
  -
    id: gl-walloewie
    type: lid
    totem: 'Galante Walloewie'
    naam: 'Marnix Van Den Bossche'
    foto: /assets/images/leidingfotos/Walloewie.jpg
    hoofdtaken: Financiën
    beschrijving: |
      Na 13 jaar te mogen genieten van het spelen, lachen en leidinggeven in TC, neem ik vanaf dit jaar de rol als financieel verantwoordelijke op binnen de groepsleiding. Het lachen, spelen en leidinggeven blijven echter mijn hoofddoelen. Hierbij komt het controleren en sturen van de in- en uitgaven en het voeren van een rationeel financieel beleid. Buiten de scouts zit ik in mijn tweede jaar lerarenopleiding Geschiedenis-Aardrijkskunde en ben ik graag bezig met sport. Naast het financiële gedeelte ondersteun ik Kantjil bij het materiaal- en lokaalbeheer. Laat je niet misleiden door de titel van rationeel financieel verantwoordelijke, want daarnaast blijf ik de uitgelaten, soms zotte leiding die elke zondag onze kinderen een leuke tijd wil bezorgen.
    email: walloewie@thilacoloma.be
